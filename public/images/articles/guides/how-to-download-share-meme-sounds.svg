<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="600" r="260" fill="#ffffff" opacity="0.05"/>

  <text x="90" y="215" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Play, Download &amp;</text>
  <text x="90" y="270" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Share Sounds</text>
  <text x="90" y="312" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbeafe">A quick guide to using Sound Meme on SoftwarePays</text>

  <!-- play button -->
  <circle cx="880" cy="220" r="80" fill="#ffffff" opacity="0.95"/>
  <path d="M855 180 v80 l70 -40 z" fill="#2563eb"/>

  <!-- download arrow -->
  <g transform="translate(1000,320)">
    <circle cx="0" cy="0" r="55" fill="#ffffff" opacity="0.9"/>
    <path d="M0 -25 v40 M-18 -3 l18 20 l18 -20" stroke="#4338ca" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- step pills -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#1e3a8a">
    <rect x="90" y="380" width="150" height="42" rx="21" fill="#ffffff"/>
    <text x="165" y="408" text-anchor="middle">1. Find</text>
    <rect x="252" y="380" width="150" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="327" y="408" text-anchor="middle">2. Play</text>
    <rect x="414" y="380" width="170" height="42" rx="21" fill="#ffffff" opacity="0.85"/>
    <text x="499" y="408" text-anchor="middle">3. Download</text>
    <rect x="596" y="380" width="150" height="42" rx="21" fill="#ffffff" opacity="0.78"/>
    <text x="671" y="408" text-anchor="middle">4. Share</text>
  </g>
</svg>

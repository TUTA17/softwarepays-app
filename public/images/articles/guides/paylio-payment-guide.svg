<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cardg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- decorative soft blobs -->
  <circle cx="1080" cy="80" r="220" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="620" r="260" fill="#ffffff" opacity="0.06"/>
  <circle cx="950" cy="560" r="140" fill="#ffffff" opacity="0.08"/>

  <!-- headline -->
  <text x="90" y="230" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#ffffff">Pay with PayLio</text>
  <text x="90" y="285" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#dbeafe">Fast, secure checkout on SoftwarePays</text>

  <!-- payment method pills -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#1e3a8a">
    <rect x="90" y="330" width="86" height="44" rx="22" fill="#ffffff"/>
    <text x="133" y="359" text-anchor="middle">Card</text>

    <rect x="188" y="330" width="118" height="44" rx="22" fill="#ffffff"/>
    <text x="247" y="359" text-anchor="middle">Apple Pay</text>

    <rect x="318" y="330" width="130" height="44" rx="22" fill="#ffffff"/>
    <text x="383" y="359" text-anchor="middle">Google Pay</text>

    <rect x="460" y="330" width="102" height="44" rx="22" fill="#ffffff"/>
    <text x="511" y="359" text-anchor="middle">PayPal</text>

    <rect x="90" y="386" width="150" height="44" rx="22" fill="#ffffff" opacity="0.92"/>
    <text x="165" y="415" text-anchor="middle">Bank Transfer</text>

    <rect x="252" y="386" width="150" height="44" rx="22" fill="#ffffff" opacity="0.92"/>
    <text x="327" y="415" text-anchor="middle">Binance Pay</text>
  </g>

  <!-- stylized card graphic -->
  <g transform="translate(760,190) rotate(-8)">
    <rect x="0" y="0" width="340" height="215" rx="24" fill="url(#cardg)"/>
    <rect x="0" y="0" width="340" height="215" rx="24" fill="none" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="30" y="45" width="52" height="38" rx="8" fill="#facc15"/>
    <rect x="30" y="120" width="220" height="16" rx="8" fill="#c7d2fe"/>
    <rect x="30" y="150" width="140" height="14" rx="7" fill="#e0e7ff"/>
    <circle cx="270" cy="60" r="26" fill="#4338ca" opacity="0.85"/>
    <circle cx="296" cy="60" r="26" fill="#2563eb" opacity="0.6"/>
    <path d="M266 175 l14 14 l26 -30" stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

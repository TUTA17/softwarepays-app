<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="600" r="260" fill="#ffffff" opacity="0.05"/>

  <text x="90" y="200" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Sound Meme</text>
  <text x="90" y="248" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbeafe">vs. typical free soundboards</text>

  <circle cx="600" cy="300" r="54" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="315" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1e3a8a" text-anchor="middle">VS</text>

  <!-- left check list -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff">
    <circle cx="110" cy="330" r="10" fill="#34d399"/>
    <text x="132" y="337">No ads or pop-ups</text>
    <circle cx="110" cy="375" r="10" fill="#34d399"/>
    <text x="132" y="382">No account needed</text>
    <circle cx="110" cy="420" r="10" fill="#34d399"/>
    <text x="132" y="427">Real search &amp; categories</text>
  </g>

  <!-- right x list -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#dbeafe">
    <circle cx="820" cy="330" r="10" fill="#f87171"/>
    <text x="842" y="337">Cluttered with ads</text>
    <circle cx="820" cy="375" r="10" fill="#f87171"/>
    <text x="842" y="382">Weak search</text>
    <circle cx="820" cy="420" r="10" fill="#f87171"/>
    <text x="842" y="427">Hard to browse</text>
  </g>
</svg>

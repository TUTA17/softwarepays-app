<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="coin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg2)"/>

  <!-- decorative soft blobs -->
  <circle cx="1080" cy="90" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="600" r="260" fill="#ffffff" opacity="0.05"/>

  <!-- headline -->
  <text x="90" y="220" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Pay with Crypto</text>
  <text x="90" y="270" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff">via NOWPayments</text>
  <text x="90" y="315" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbeafe">Fast, secure, and private checkout on SoftwarePays</text>

  <!-- coin pills -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#1e3a8a">
    <rect x="90" y="360" width="110" height="42" rx="21" fill="#ffffff"/>
    <text x="145" y="388" text-anchor="middle">BTC</text>

    <rect x="212" y="360" width="110" height="42" rx="21" fill="#ffffff"/>
    <text x="267" y="388" text-anchor="middle">ETH</text>

    <rect x="334" y="360" width="114" height="42" rx="21" fill="#ffffff"/>
    <text x="391" y="388" text-anchor="middle">USDT</text>

    <rect x="460" y="360" width="114" height="42" rx="21" fill="#ffffff"/>
    <text x="517" y="388" text-anchor="middle">USDC</text>

    <rect x="90" y="414" width="106" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="143" y="442" text-anchor="middle">BNB</text>

    <rect x="208" y="414" width="106" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="261" y="442" text-anchor="middle">SOL</text>

    <rect x="326" y="414" width="200" height="42" rx="21" fill="#ffffff" opacity="0.85"/>
    <text x="426" y="442" text-anchor="middle">+ hundreds more</text>
  </g>

  <!-- stylized coin cluster -->
  <g transform="translate(880,260)">
    <circle cx="60" cy="60" r="95" fill="url(#coin2)" opacity="0.9"/>
    <circle cx="180" cy="30" r="66" fill="url(#coin)"/>
    <text x="180" y="42" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#7c2d12" text-anchor="middle">B</text>
    <circle cx="60" cy="60" r="60" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <text x="60" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#1e3a8a" text-anchor="middle">$</text>
  </g>
</svg>

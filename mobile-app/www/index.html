<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>SoftwarePays Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="login-view" class="view">
    <div class="login-box">
      <img src="assets/logo.png" alt="SoftwarePays" class="login-logo">
      <p class="app-subtitle">Quản lý bán hàng</p>
      <form id="login-form">
        <label>Email / Số điện thoại</label>
        <input type="text" id="login-email" autocomplete="username" required>
        <label>Mật khẩu</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
        <div id="login-error" class="error-text"></div>
        <button type="submit" id="login-submit" class="btn btn-primary btn-block">Đăng nhập</button>
      </form>
    </div>
  </section>

  <div id="app-shell" class="hidden">
    <header class="app-header">
      <div class="header-left">
        <img src="assets/mark.png" alt="" class="header-mark">
        <h1 id="header-title">Dashboard</h1>
      </div>
      <div class="header-actions">
        <button id="refresh-btn" class="icon-btn" title="Làm mới">&#8635;</button>
        <button id="logout-btn" class="icon-btn" title="Đăng xuất">&#9211;</button>
      </div>
    </header>

    <main id="tab-content">
      <section id="view-dashboard" class="tab-view">
        <div id="dashboard-stats" class="stat-grid"></div>
        <div class="section-title">Doanh thu 30 ngày qua</div>
        <div id="dashboard-chart" class="chart-scroll"></div>
        <div class="section-title">Top 5 sản phẩm bán chạy</div>
        <div id="dashboard-top-games" class="mini-list"></div>
        <div class="section-title">Top 5 khách hàng VIP</div>
        <div id="dashboard-top-users" class="mini-list"></div>
        <div class="section-title">Giao dịch gần đây</div>
        <div id="dashboard-recent-tx" class="mini-list"></div>
      </section>

      <section id="view-orders" class="tab-view hidden">
        <div id="fulfillment-mode-row" class="fulfillment-mode-row">
          <span class="fulfillment-mode-label">Chế độ xử lý đơn:</span>
          <button id="fulfillment-mode-manual" class="btn btn-sm" type="button">Thủ công</button>
          <button id="fulfillment-mode-auto" class="btn btn-sm" type="button">Tự động</button>
        </div>
        <div id="filter-chips" class="filter-chips"></div>
        <div id="orders-list" class="orders-list"></div>
        <div id="orders-empty" class="empty-state hidden">Không có đơn hàng nào</div>
        <button id="orders-load-more" class="btn btn-block load-more hidden">Tải thêm</button>
      </section>

      <section id="view-customers" class="tab-view hidden">
        <div class="search-bar">
          <input type="text" id="customers-search" placeholder="Tìm theo tên hoặc email...">
        </div>
        <div id="customers-list" class="orders-list"></div>
        <div id="customers-empty" class="empty-state hidden">Không có khách hàng nào</div>
        <button id="customers-load-more" class="btn btn-block load-more hidden">Tải thêm</button>
      </section>

      <section id="view-transactions" class="tab-view hidden">
        <div class="search-bar">
          <input type="month" id="transactions-month">
          <button id="transactions-filter-clear" class="btn btn-sm">Xoá lọc</button>
        </div>
        <div id="transactions-list" class="orders-list"></div>
        <div id="transactions-empty" class="empty-state hidden">Không có giao dịch nào</div>
        <button id="transactions-load-more" class="btn btn-block load-more hidden">Tải thêm</button>
      </section>
    </main>

    <nav id="bottom-tabs" class="bottom-tabs">
      <button class="tab-btn active" data-tab="dashboard">
        <span class="tab-icon">&#9776;</span><span>Dashboard</span>
      </button>
      <button class="tab-btn" data-tab="orders">
        <span class="tab-icon">&#128230;</span><span>Đơn hàng</span>
      </button>
      <button class="tab-btn" data-tab="customers">
        <span class="tab-icon">&#128101;</span><span>Khách hàng</span>
      </button>
      <button class="tab-btn" data-tab="transactions">
        <span class="tab-icon">&#128179;</span><span>Giao dịch</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>

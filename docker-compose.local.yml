services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keygame_keyngon
    ports:
      - "3307:3306"
    volumes:
      - keygame_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: php:8.3-cli
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "docker-php-ext-install pdo_mysql mysqli bcmath >/tmp/ext.log 2>&1 &&
               { echo 'opcache.enable=1'; echo 'opcache.enable_cli=1'; echo 'opcache.memory_consumption=256'; echo 'opcache.max_accelerated_files=30000'; echo 'opcache.validate_timestamps=0'; } > /usr/local/etc/php/conf.d/zz-opcache-tune.ini &&
               { echo 'upload_max_filesize=12M'; echo 'post_max_size=15M'; } > /usr/local/etc/php/conf.d/zz-upload-tune.ini &&
               (php artisan queue:work --tries=3 --sleep=2 >> storage/logs/queue.log 2>&1 &) &&
               php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  keygame_db_data:
